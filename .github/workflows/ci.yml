name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  headless:
    name: Headless (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake -S . -B build -DDAWN_ENABLE_QT=OFF -DDAWN_USE_FLUENTUI=OFF -DDAWN_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Debug

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build -DDAWN_ENABLE_QT=OFF -DDAWN_USE_FLUENTUI=OFF -DDAWN_BUILD_TESTS=ON

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake --build build --parallel

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Debug --parallel

      - name: Test (Linux/macOS)
        if: runner.os != 'Windows'
        run: ctest --test-dir build --output-on-failure --repeat until-pass:3

      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: ctest --test-dir build -C Debug --output-on-failure --repeat until-pass:3

  qt_fluentui_smoke:
    name: Qt FluentUI Smoke (ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt and toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build qt6-base-dev qt6-declarative-dev

      - name: Configure Qt build
        run: cmake -S . -B build-qt -G Ninja -DDAWN_ENABLE_QT=ON -DDAWN_USE_FLUENTUI=ON -DDAWN_BUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Debug

      - name: Build Qt targets
        run: cmake --build build-qt --parallel
