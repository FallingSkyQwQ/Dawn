name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  headless_tests:
    if: ${{ github.event_name != 'push' || contains(github.event.head_commit.message, '[ci]') }}
    name: Headless Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev

      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake -S . -B build -DDAWN_ENABLE_QT=OFF -DDAWN_USE_FLUENTUI=OFF -DDAWN_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Debug

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build -DDAWN_ENABLE_QT=OFF -DDAWN_USE_FLUENTUI=OFF -DDAWN_BUILD_TESTS=ON

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake --build build --parallel

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Debug --parallel

      - name: Test (Linux/macOS)
        if: runner.os != 'Windows'
        run: ctest --test-dir build --output-on-failure --repeat until-pass:3

      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: ctest --test-dir build -C Debug --output-on-failure --repeat until-pass:3
